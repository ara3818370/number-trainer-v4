<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>QA Test Runner</title></head>
<body>
<pre id="output">Running tests...</pre>
<script type="module">
import {
  cardinalToWords, ordinalToWords, ordinalSuffix, yearToWords,
  decadeToWords, fractionToWords, decimalToWords, currencyToWords,
  percentageToWords, roomBusToWords, scoreToWords, temperatureToWords,
  largeNumberToWords
} from './js/numbers-en.js';

import { generateConfusers } from './js/confuser.js';

let out = '';
let passed = 0, failed = 0;
const failures = [];

function log(s) { out += s + '\n'; }
function test(label, actual, expected) {
  if (actual === expected) { passed++; }
  else {
    failed++;
    failures.push({ label, actual, expected });
    log(`FAIL: ${label} | expected: "${expected}" | actual: "${actual}"`);
  }
}

log("=== PART 1: Previous Bug Fix Verification (25 cases) ===");
test("P1-cardinal(0)", cardinalToWords(0), "zero");
test("P1-cardinal(13)", cardinalToWords(13), "thirteen");
test("P1-cardinal(30)", cardinalToWords(30), "thirty");
test("P1-cardinal(101)", cardinalToWords(101), "one hundred and one");
test("P1-cardinal(999999)", cardinalToWords(999999), "nine hundred and ninety-nine thousand nine hundred and ninety-nine");
test("P1-ordinal(1)", ordinalToWords(1), "the first");
test("P1-ordinal(12)", ordinalToWords(12), "the twelfth");
test("P1-ordinal(21)", ordinalToWords(21), "the twenty-first");
test("P1-ordinal(100)", ordinalToWords(100), "the one hundredth");
test("P1-year(2000)", yearToWords(2000), "two thousand");
test("P1-year(2001)", yearToWords(2001), "two thousand and one");
test("P1-year(1906)", yearToWords(1906), "nineteen oh six");
test("P1-year(1453)", yearToWords(1453), "fourteen fifty-three");
test("P1-year(1200)", yearToWords(1200), "twelve hundred");
test("P1-fraction(0,1,2)", fractionToWords(0, 1, 2), "one half");
test("P1-fraction(0,3,4)", fractionToWords(0, 3, 4), "three quarters");
test("P1-fraction(2,1,3)", fractionToWords(2, 1, 3), "two and one third");
test("P1-decimal(1.36)", decimalToWords(1.36), "one point three six");
test("P1-decimal(0.02)", decimalToWords(0.02), "nought point oh two");
test("P1-currency(5.35)", currencyToWords(5.35), "five dollars and thirty-five cents");
test("P1-score(5,0)", scoreToWords(5, 0), "five nil");
test("P1-score(2,2)", scoreToWords(2, 2), "two all");
test("P1-temp(-10)", temperatureToWords(-10), "minus ten degrees Celsius");
test("P1-roomBus(room,101)", roomBusToWords('room', 101), "room one oh one");
test("P1-percentage(7.98)", percentageToWords(7.98), "seven point nine eight per cent");

log("\n=== PART 2a: Cardinals — Deep ===");
const cardTests = [
  [0, "zero"], [1, "one"], [10, "ten"], [11, "eleven"], [12, "twelve"],
  [13, "thirteen"], [19, "nineteen"], [20, "twenty"], [21, "twenty-one"],
  [30, "thirty"], [50, "fifty"], [99, "ninety-nine"],
  [100, "one hundred"], [101, "one hundred and one"], [110, "one hundred and ten"],
  [111, "one hundred and eleven"], [112, "one hundred and twelve"],
  [113, "one hundred and thirteen"], [119, "one hundred and nineteen"],
  [120, "one hundred and twenty"], [121, "one hundred and twenty-one"],
  [199, "one hundred and ninety-nine"], [200, "two hundred"], [300, "three hundred"],
  [999, "nine hundred and ninety-nine"],
  [1000, "one thousand"], [1001, "one thousand one"],
  [1010, "one thousand ten"], [1011, "one thousand eleven"],
  [1100, "one thousand one hundred"],
  [1111, "one thousand one hundred and eleven"],
  [1234, "one thousand two hundred and thirty-four"],
  [10000, "ten thousand"], [10001, "ten thousand one"],
  [10100, "ten thousand one hundred"],
  [11111, "eleven thousand one hundred and eleven"],
  [12345, "twelve thousand three hundred and forty-five"],
  [100000, "one hundred thousand"], [100001, "one hundred thousand one"],
  [100100, "one hundred thousand one hundred"],
  [101000, "one hundred and one thousand"],
  [111111, "one hundred and eleven thousand one hundred and eleven"],
  [123456, "one hundred and twenty-three thousand four hundred and fifty-six"],
  [150000, "one hundred and fifty thousand"],
  [250999, "two hundred and fifty thousand nine hundred and ninety-nine"],
  [500000, "five hundred thousand"],
  [999999, "nine hundred and ninety-nine thousand nine hundred and ninety-nine"],
];
for (const [n, exp] of cardTests) {
  test(`cardinal(${n})`, cardinalToWords(n), exp);
}

log("\n=== PART 2b: Ordinals — Deep ===");
const ordTests = [
  [1, "the first"], [2, "the second"], [3, "the third"],
  [4, "the fourth"], [5, "the fifth"], [8, "the eighth"],
  [9, "the ninth"], [11, "the eleventh"], [12, "the twelfth"],
  [13, "the thirteenth"], [20, "the twentieth"], [21, "the twenty-first"],
  [30, "the thirtieth"], [40, "the fortieth"], [50, "the fiftieth"],
  [100, "the one hundredth"],
];
for (const [n, exp] of ordTests) {
  test(`ordinal(${n})`, ordinalToWords(n), exp);
}

log("\n=== PART 2c: Years — Deep ===");
const yearTests = [
  [1200, "twelve hundred"], [1300, "thirteen hundred"],
  [1453, "fourteen fifty-three"], [1500, "fifteen hundred"],
  [1776, "seventeen seventy-six"], [1800, "eighteen hundred"],
  [1900, "nineteen hundred"], [1901, "nineteen oh one"],
  [1910, "nineteen ten"], [1999, "nineteen ninety-nine"],
  [2000, "two thousand"], [2001, "two thousand and one"],
  [2009, "two thousand and nine"],
];
for (const [y, exp] of yearTests) {
  test(`year(${y})`, yearToWords(y), exp);
}
// 2010+ uses "twenty X" style
log(`year(2010) actual: "${yearToWords(2010)}" [twenty ten]`);
test("year(2010)", yearToWords(2010), "twenty ten");
log(`year(2020) actual: "${yearToWords(2020)}" [twenty twenty]`);
test("year(2020)", yearToWords(2020), "twenty twenty");
log(`year(2026) actual: "${yearToWords(2026)}" [twenty twenty-six]`);
test("year(2026)", yearToWords(2026), "twenty twenty-six");
test("year(1066)", yearToWords(1066), "ten sixty-six");

log("\n=== PART 2d: Fractions — Deep ===");
const fracTests = [
  [[0,1,2], "one half"], [[0,1,4], "one quarter"], [[0,3,4], "three quarters"],
  [[0,1,3], "one third"], [[0,2,3], "two thirds"],
  [[0,1,5], "one fifth"], [[0,2,5], "two fifths"],
  [[0,1,8], "one eighth"], [[0,3,8], "three eighths"],
  [[1,1,2], "one and a half"], [[2,3,4], "two and three quarters"],
  [[0,1,6], "one sixth"], [[0,2,6], "two sixths"],
  [[0,1,7], "one seventh"], [[0,1,9], "one ninth"],
  [[0,1,10], "one tenth"], [[0,7,10], "seven tenths"],
  // Mixed with non-half
  [[3,1,3], "three and one third"], [[5,2,5], "five and two fifths"],
];
for (const [args, exp] of fracTests) {
  test(`fraction(${args})`, fractionToWords(...args), exp);
}

log("\n=== PART 2e: Decimals — Deep ===");
// decimalToWords uses toFixed(2), so 0.5 → "0.50"
test("decimal(0.5)", decimalToWords(0.5), "nought point five oh");
test("decimal(0.02)", decimalToWords(0.02), "nought point oh two");
test("decimal(0.10)", decimalToWords(0.10), "nought point one oh");
test("decimal(1.36)", decimalToWords(1.36), "one point three six");
test("decimal(9.99)", decimalToWords(9.99), "nine point nine nine");

log("\n=== PART 2f: Currencies — Deep ===");
test("currency(0.01)", currencyToWords(0.01), "one cent");
test("currency(1.00)", currencyToWords(1.00), "one dollar");
test("currency(1.01)", currencyToWords(1.01), "one dollar and one cent");
test("currency(5.35)", currencyToWords(5.35), "five dollars and thirty-five cents");
test("currency(10.50)", currencyToWords(10.50), "ten dollars and fifty cents");
test("currency(0.99)", currencyToWords(0.99), "ninety-nine cents");

log("\n=== PART 2g: Percentages — Deep ===");
test("pct(0)", percentageToWords(0), "nought per cent");
test("pct(1)", percentageToWords(1), "one per cent");
test("pct(7.98)", percentageToWords(7.98), "seven point nine eight per cent");
test("pct(100)", percentageToWords(100), "one hundred per cent");
test("pct(50.5)", percentageToWords(50.5), "fifty point five per cent");

log("\n=== PART 2h: Sports Scores — Deep ===");
test("score(5,0)", scoreToWords(5,0), "five nil");
test("score(0,0)", scoreToWords(0,0), "nil nil");
test("score(2,2)", scoreToWords(2,2), "two all");
test("score(1,0)", scoreToWords(1,0), "one nil");
test("score(3,2)", scoreToWords(3,2), "three two");

log("\n=== PART 2i: Temperatures — Deep ===");
test("temp(0)", temperatureToWords(0), "zero degrees Celsius");
test("temp(-1)", temperatureToWords(-1), "minus one degree Celsius");
test("temp(-10)", temperatureToWords(-10), "minus ten degrees Celsius");
test("temp(1)", temperatureToWords(1), "one degree");
test("temp(25)", temperatureToWords(25), "twenty-five degrees");
test("temp(-40)", temperatureToWords(-40), "minus forty degrees Celsius");

log("\n=== PART 2j: Room/Bus Numbers — Deep ===");
test("room(room,101)", roomBusToWords('room',101), "room one oh one");
test("room(room,200)", roomBusToWords('room',200), "room two hundred");
test("room(room,305)", roomBusToWords('room',305), "room three oh five");
test("room(bus,602)", roomBusToWords('bus',602), "bus six oh two");
// Edge cases
log(`room(room,10) actual: "${roomBusToWords('room',10)}" [2-digit edge case]`);
log(`room(room,110) actual: "${roomBusToWords('room',110)}" [XY0 tens]`);

log("\n=== PART 2k: Decades — Deep ===");
test("decade(90,early)", decadeToWords(90,'early'), "the early nineties");
test("decade(80,late)", decadeToWords(80,'late'), "the late eighties");
test("decade(70,mid)", decadeToWords(70,'mid'), "the mid seventies");

log("\n=== PART 3: Confuser Tests ===");

function testConfusers(label, target) {
  const confusers = generateConfusers(target);
  const all = [target, ...confusers];
  const issues = [];
  
  if (confusers.length !== 3) issues.push(`Got ${confusers.length} confusers, expected 3`);
  
  const displays = all.map(o => o.display);
  const uniqueDisplays = new Set(displays);
  if (uniqueDisplays.size !== all.length) issues.push(`Duplicates: ${JSON.stringify(displays)}`);
  
  const targetLD = target.lastDigit;
  const sameLD = all.filter(o => o.lastDigit === targetLD).length;
  if (sameLD < 2) issues.push(`Last-digit constraint violated: ${sameLD}/4 share LD=${targetLD}`);
  
  if (issues.length > 0) {
    failed++;
    failures.push({ label, actual: issues.join('; '), expected: 'no issues' });
    log(`FAIL: ${label}: ${issues.join('; ')}`);
  } else { passed++; }
}

// Run confuser tests multiple times for stochastic coverage
for (let i = 0; i < 3; i++) {
  testConfusers(`confuser: cardinal-1 #${i}`, { value: 1, display: '1', ttsText: 'one', lastDigit: 1, category: 'cardinals' });
  testConfusers(`confuser: score-0:0 #${i}`, { value: { home: 0, away: 0 }, display: '0:0', ttsText: 'nil nil', lastDigit: 0, category: 'sports' });
  testConfusers(`confuser: frac-1/2 #${i}`, { value: { whole: 0, num: 1, den: 2 }, display: '1/2', ttsText: 'one half', lastDigit: 2, category: 'fractions' });
  testConfusers(`confuser: temp--1 #${i}`, { value: -1, display: '-1°C', ttsText: 'minus one degree Celsius', lastDigit: 1, category: 'temperatures' });
  testConfusers(`confuser: year-2000 #${i}`, { value: 2000, display: '2000', ttsText: 'two thousand', lastDigit: 0, category: 'years' });
  testConfusers(`confuser: ordinal-1 #${i}`, { value: 1, display: '1st', ttsText: 'the first', lastDigit: 1, category: 'ordinals' });
  testConfusers(`confuser: room-101 #${i}`, { value: { type: 'room', number: 101 }, display: 'Room 101', ttsText: 'room one oh one', lastDigit: 1, category: 'roomBus' });
  testConfusers(`confuser: pct-50 #${i}`, { value: 50, display: '50%', ttsText: 'fifty per cent', lastDigit: 0, category: 'percentages' });
  testConfusers(`confuser: curr-1.00 #${i}`, { value: 1.00, display: '$1.00', ttsText: 'one dollar', lastDigit: 0, category: 'currencies' });
  testConfusers(`confuser: dec-0.02 #${i}`, { value: 0.02, display: '0.02', ttsText: 'nought point oh two', lastDigit: 2, category: 'decimals' });
  testConfusers(`confuser: large-150000 #${i}`, { value: 150000, display: '150\u2009000', ttsText: 'one hundred and fifty thousand', lastDigit: 0, category: 'large' });
}

log("\n=== PART 4: Code Quality Edge Cases ===");

// Room 10 — 2-digit number
const r10 = roomBusToWords('room', 10);
log(`roomBus(room,10) = "${r10}"`);
if (r10.includes('undefined') || r10 === 'room' || r10 === 'room ') {
  failed++;
  failures.push({ label: 'roomBus 2-digit edge', actual: r10, expected: 'valid output' });
  log('FAIL: roomBus 2-digit edge case broken');
}

// Currency $0.00
const c0 = currencyToWords(0);
log(`currency(0) = "${c0}"`);

// Cardinal of negative
test("cardinal(-5)", cardinalToWords(-5), "minus five");

// "and" placement: 1001 should NOT have "and" (no hundreds)
const c1001 = cardinalToWords(1001);
log(`cardinal(1001) = "${c1001}" — should be "one thousand one" (no "and" — no hundreds block)`);
// Per BA spec: "and" only after "hundred", not after "thousand" when no hundreds
test("cardinal(1001) no and", c1001, "one thousand one");

// 17003 — thousand + units, no hundreds
test("cardinal(17003)", cardinalToWords(17003), "seventeen thousand three");

// ordinalSuffix edge cases
test("suffix(1)", ordinalSuffix(1), "st");
test("suffix(2)", ordinalSuffix(2), "nd");
test("suffix(3)", ordinalSuffix(3), "rd");
test("suffix(11)", ordinalSuffix(11), "th");
test("suffix(12)", ordinalSuffix(12), "th");
test("suffix(13)", ordinalSuffix(13), "th");
test("suffix(21)", ordinalSuffix(21), "st");
test("suffix(22)", ordinalSuffix(22), "nd");
test("suffix(23)", ordinalSuffix(23), "rd");
test("suffix(111)", ordinalSuffix(111), "th");
test("suffix(112)", ordinalSuffix(112), "th");
test("suffix(113)", ordinalSuffix(113), "th");

log("\n=== SUMMARY ===");
log(`Total: ${passed + failed}`);
log(`Passed: ${passed}`);
log(`Failed: ${failed}`);
if (failures.length > 0) {
  log("\nAll failures:");
  for (const f of failures) {
    log(`  ${f.label}: expected "${f.expected}" got "${f.actual}"`);
  }
}

document.getElementById('output').textContent = out;
</script>
</body></html>
