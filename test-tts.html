<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS Diagnostic — Number Trainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      max-width: 500px;
      margin: 0 auto;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f5f5f7; }
      .card { background: #2c2c2e; border-color: #48484a; }
      button { background: #3a3a3c; color: #f5f5f7; border-color: #48484a; }
      button.active { background: #007aff; color: #fff; }
      #voices-list { background: #2c2c2e; color: #f5f5f7; }
    }
    h1 { font-size: 1.5rem; margin-bottom: 16px; text-align: center; }
    h2 { font-size: 1.1rem; margin: 16px 0 8px; }
    .card { background: #fff; border: 1px solid #d2d2d7; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .test-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      padding: 10px 16px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      min-height: 44px;
      touch-action: manipulation;
    }
    button:active { opacity: 0.7; }
    button.active { background: #007aff; color: #fff; border-color: #007aff; }
    .status { margin-top: 8px; padding: 8px; border-radius: 8px; font-size: 0.9rem; min-height: 36px; }
    .status.ok { background: #d4f5dd; color: #1b5e20; }
    .status.error { background: #fddcda; color: #b71c1c; }
    .status.pending { background: #fff3cd; color: #856404; }
    #voices-list {
      width: 100%; height: 120px; font-size: 0.8rem;
      border: 1px solid #d2d2d7; border-radius: 8px;
      padding: 8px; margin-top: 8px; background: #fff;
    }
    .yearwords-display { font-size: 0.85rem; color: #6e6e73; margin-top: 4px; font-style: italic; }
  </style>
</head>
<body>
  <h1>🔬 TTS Diagnostic</h1>

  <!-- Voices section -->
  <div class="card">
    <h2>Available Voices</h2>
    <button id="btn-load-voices">Load Voices</button>
    <div id="status-voices" class="status"></div>
    <textarea id="voices-list" readonly></textarea>
  </div>

  <!-- Speed selector -->
  <div class="card">
    <h2>Speed</h2>
    <div class="test-grid">
      <button class="speed-sel" data-rate="0.7">Slow (0.7)</button>
      <button class="speed-sel active" data-rate="1.0">Normal (1.0)</button>
      <button class="speed-sel" data-rate="1.3">Fast (1.3)</button>
    </div>
  </div>

  <!-- Simple numbers -->
  <div class="card">
    <h2>Simple Numbers (1–100)</h2>
    <div class="test-grid">
      <button class="speak-btn" data-text="1">1</button>
      <button class="speak-btn" data-text="7">7</button>
      <button class="speak-btn" data-text="10">10</button>
      <button class="speak-btn" data-text="13">13</button>
      <button class="speak-btn" data-text="30">30</button>
      <button class="speak-btn" data-text="18">18</button>
      <button class="speak-btn" data-text="80">80</button>
      <button class="speak-btn" data-text="50">50</button>
      <button class="speak-btn" data-text="100">100</button>
    </div>
    <div id="status-simple" class="status"></div>
  </div>

  <!-- Years (with yearToWords) -->
  <div class="card">
    <h2>Years (yearToWords → TTS)</h2>
    <div class="test-grid" id="years-grid"></div>
    <div id="yearwords-display" class="yearwords-display"></div>
    <div id="status-years" class="status"></div>
  </div>

  <!-- Large numbers -->
  <div class="card">
    <h2>Large Numbers</h2>
    <div class="test-grid">
      <button class="speak-btn" data-text="500">500</button>
      <button class="speak-btn" data-text="1500">1,500</button>
      <button class="speak-btn" data-text="50000">50,000</button>
      <button class="speak-btn" data-text="999999">999,999</button>
    </div>
    <div id="status-large" class="status"></div>
  </div>

  <script type="module">
    import { yearToWords } from './js/confuser.js';

    // ── State ────────────────────────────────────────────────
    let currentRate = 1.0;
    let selectedVoice = null;

    // ── Voice loading ────────────────────────────────────────
    function selectBestVoice(voices) {
      const preferred = voices.find(v => /samantha|daniel/i.test(v.name) && v.lang.startsWith('en'));
      if (preferred) return preferred;
      const enUS = voices.find(v => v.lang === 'en-US');
      if (enUS) return enUS;
      const enAny = voices.find(v => v.lang.startsWith('en'));
      if (enAny) return enAny;
      return voices[0] || null;
    }

    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      const listEl = document.getElementById('voices-list');
      const statusEl = document.getElementById('status-voices');

      if (voices.length === 0) {
        statusEl.textContent = '⏳ No voices yet — tap again or wait...';
        statusEl.className = 'status pending';
        return;
      }

      const enVoices = voices.filter(v => v.lang.startsWith('en'));
      listEl.value = voices.map(v =>
        `${v.lang.startsWith('en') ? '✓' : ' '} ${v.name} (${v.lang})${v.default ? ' [DEFAULT]' : ''}`
      ).join('\n');

      selectedVoice = selectBestVoice(voices);
      statusEl.textContent = `✅ ${voices.length} voices found, ${enVoices.length} English. Selected: ${selectedVoice?.name || 'none'}`;
      statusEl.className = 'status ok';
    }

    document.getElementById('btn-load-voices').addEventListener('click', loadVoices);
    speechSynthesis.addEventListener('voiceschanged', loadVoices);
    // Try immediately
    setTimeout(loadVoices, 500);

    // ── Speed selector ───────────────────────────────────────
    document.querySelectorAll('.speed-sel').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.speed-sel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRate = parseFloat(btn.dataset.rate);
      });
    });

    // ── Speak function ───────────────────────────────────────
    function speakText(text, statusId) {
      const statusEl = document.getElementById(statusId);
      if (!selectedVoice) {
        if (statusEl) { statusEl.textContent = '❌ No voice selected — load voices first'; statusEl.className = 'status error'; }
        return;
      }

      speechSynthesis.cancel();
      setTimeout(() => {
        const utt = new SpeechSynthesisUtterance(text);
        utt.voice = selectedVoice;
        utt.lang = selectedVoice.lang || 'en-US';
        utt.rate = currentRate;

        utt.onstart = () => {
          if (statusEl) { statusEl.textContent = `⏳ Speaking: "${text}" (rate ${currentRate})`; statusEl.className = 'status pending'; }
        };
        utt.onend = () => {
          if (statusEl) { statusEl.textContent = `✅ Done: "${text}"`; statusEl.className = 'status ok'; }
        };
        utt.onerror = (e) => {
          if (statusEl) { statusEl.textContent = `❌ Error: ${e.error}`; statusEl.className = 'status error'; }
        };

        speechSynthesis.speak(utt);
      }, 100);
    }

    // ── Simple number buttons ────────────────────────────────
    document.querySelectorAll('#status-simple').forEach(() => {}); // noop
    document.querySelectorAll('.speak-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const text = btn.dataset.text;
        const card = btn.closest('.card');
        const statusEl = card.querySelector('.status');
        speakText(text, statusEl?.id || 'status-simple');
      });
    });

    // ── Year buttons (with yearToWords) ──────────────────────
    const yearTests = [1900, 1905, 1987, 2000, 2001, 2010, 2026, 1812, 1100, 2099];
    const yearsGrid = document.getElementById('years-grid');

    yearTests.forEach(year => {
      const btn = document.createElement('button');
      btn.className = 'speak-btn';
      btn.textContent = year;
      btn.addEventListener('click', () => {
        const words = yearToWords(year);
        document.getElementById('yearwords-display').textContent = `yearToWords(${year}) → "${words}"`;
        speakText(words, 'status-years');
      });
      yearsGrid.appendChild(btn);
    });
  </script>
</body>
</html>
